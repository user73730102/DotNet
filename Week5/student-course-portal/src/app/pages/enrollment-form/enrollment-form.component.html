<h2>Enrollment Request</h2>

<div *ngIf="submitted" style="color: green; margin-bottom: 20px;">
  Enrollment request submitted successfully!
</div>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" *ngIf="!submitted">
  <div>
    <label>Student Name</label>
    <input type="text" name="studentName" ngModel required minlength="3" #nameCtrl="ngModel">
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" style="color: red;">Name is required</span>
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" style="color: red;">Name must be at least 3 characters</span>
  </div>

  <div>
    <label>Student Email</label>
    <input type="email" name="studentEmail" ngModel required email #emailCtrl="ngModel">
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" style="color: red;">Email is required</span>
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" style="color: red;">Enter a valid email</span>
  </div>

  <div>
    <label>Course ID</label>
    <input type="number" name="courseId" ngModel required #courseCtrl="ngModel">
    <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" style="color: red;">Course ID is required</span>
  </div>

  <div>
    <label>Preferred Semester</label>
    <select name="preferredSemester" ngModel required #semesterCtrl="ngModel">
      <option value="" disabled>Select a semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div>
    <label>
      <input type="checkbox" name="agreeToTerms" ngModel required #termsCtrl="ngModel">
      I agree to the terms and conditions
    </label>
    <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']" style="color: red;">You must agree to terms</span>
  </div>

  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  <button type="button" (click)="resetForm(enrollForm)">Reset</button>
</form>
